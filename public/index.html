<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golem 電子書跨站搜尋</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .source-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .source-title { border-bottom: 2px solid #007bff; padding-bottom: 5px; margin-bottom: 10px; color: #333; }
        .book-item { margin: 8px 0; font-size: 14px; }
        .book-item a { color: #0056b3; text-decoration: none; }
        .loading { display: none; text-align: center; margin: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Golem 電子書跨站搜尋</h1>
        <div class="search-box">
            <input type="text" id="keyword" placeholder="輸入繁體或簡體書名...">
            <button onclick="doSearch()">搜尋</button>
        </div>
        <div id="loading" class="loading">正在跨越時空抓取資料中... (約需 10-15 秒)</div>
        <div id="results" class="grid"></div>
    </div>

    <script>
        async function doSearch() {
            const keyword = document.getElementById('keyword').value;
            if (!keyword) return;
            
            const resultsDiv = document.getElementById('results');
            const loading = document.getElementById('loading');
            resultsDiv.innerHTML = '';
            loading.style.display = 'block';

            try {
                const response = await fetch(`/search_books?keyword=${encodeURIComponent(keyword)}`);
                const data = await response.json();
                
                loading.style.display = 'none';
                if (response.ok && data.status === 'success') {
                    if (data.results.length === 0) {
                        resultsDiv.innerHTML = '<p style="color:gray; width:100%; text-align:center;">無任何搜尋結果</p>';
                        return;
                    }
                    data.results.forEach(source => {
                        const card = document.createElement('div');
                        card.className = 'source-card';
                        let html = `<div class="source-title">${source.source} (${source.books ? source.books.length : 0})</div>`;
                        
                        if (!source.books || source.books.length === 0) {
                            html += `<p style="color:gray">查無結果或該站暫時失效</p>`;
                        } else {
                            source.books.forEach(book => {
                                html += `<div class="book-item">· <a href="${book.url}" target="_blank">${book.title}</a></div>`;
                            });
                        }
                        card.innerHTML = html;
                        resultsDiv.appendChild(card);
                    });
                } else {
                    resultsDiv.innerHTML = `<div style="color:red; font-weight:bold; width:100%; text-align:center;">搜尋發生錯誤: ${data.error || data.message || '伺服器錯誤'}</div>`;
                }
            } catch (e) {
                loading.style.display = 'none';
                resultsDiv.innerHTML = `<div style="color:red; font-weight:bold; width:100%; text-align:center;">請求失敗，請檢查網路連線或後端服務是否啟動</div>`;
            }
        }
    </script>
</body>
</html>
